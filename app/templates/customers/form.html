{% extends "base.html" %}
{% block title %}{{ 'Edit' if customer else 'New' }} Customer - Sportspedal{% endblock %}
{% block content %}
<h2 class="mb-4">{{ 'Edit' if customer else 'New' }} Customer</h2>

<div class="card">
    <div class="card-body">
        <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">Name</label>
                    <input type="text" name="name" class="form-control" value="{{ customer.name if customer else '' }}" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Customer Type</label>
                    <select name="customer_type" class="form-select">
                        <option value="public" {{ 'selected' if not customer or customer.customer_type == 'public' }}>Public (MRP)</option>
                        <option value="coach" {{ 'selected' if customer and customer.customer_type == 'coach' }}>Coach</option>
                        <option value="bulk" {{ 'selected' if customer and customer.customer_type == 'bulk' }}>Bulk Buyer</option>
                        <option value="dealer" {{ 'selected' if customer and customer.customer_type == 'dealer' }}>Dealer</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Phone</label>
                    <input type="text" name="phone" class="form-control" value="{{ customer.phone if customer else '' }}">
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" value="{{ customer.email if customer else '' }}">
                </div>
                <div class="col-md-8">
                    <label class="form-label">Address</label>
                    <input type="text" name="address" class="form-control" value="{{ customer.address if customer else '' }}">
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-3">
                    <label class="form-label">City</label>
                    <input type="text" name="city" class="form-control" value="{{ customer.city if customer else '' }}">
                </div>
                <div class="col-md-3">
                    <label class="form-label">State</label>
                    <input type="text" name="state" class="form-control" value="{{ customer.state if customer else 'Karnataka' }}">
                </div>
                <div class="col-md-3">
                    <label class="form-label">GSTIN (if B2B)</label>
                    <input type="text" name="gstin" class="form-control" value="{{ customer.gstin if customer else '' }}">
                </div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">{{ 'Update' if customer else 'Create' }} Customer</button>
                <a href="{{ url_for('customers.list_customers') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

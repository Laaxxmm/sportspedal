{% extends "base.html" %}
{% block title %}Record Payment - Sportspedal{% endblock %}
{% block content %}
<h2 class="mb-4">Record Supplier Payment</h2>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row mb-3">
                <div class="col-md-3">
                    <label class="form-label">Supplier *</label>
                    <select name="supplier_id" class="form-select" id="supplier-select" required>
                        <option value="">Select supplier...</option>
                        {% for s in suppliers %}
                        <option value="{{ s.id }}" data-balance="{{ balances[s.id].balance }}">
                            {{ s.name }} (Balance: Rs.{{ "{:,.0f}".format(balances[s.id].balance) }})
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Date *</label>
                    <input type="date" name="payment_date" class="form-control" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Amount (Rs.) *</label>
                    <input type="number" name="amount" class="form-control" step="0.01" min="0.01" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Payment Mode</label>
                    <select name="payment_mode" class="form-select">
                        <option value="">Select...</option>
                        <option value="bank_transfer">Bank Transfer</option>
                        <option value="upi">UPI</option>
                        <option value="cash">Cash</option>
                        <option value="cheque">Cheque</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Reference / UTR No.</label>
                    <input type="text" name="reference_number" class="form-control" placeholder="Transaction reference">
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-12">
                    <label class="form-label">Notes</label>
                    <input type="text" name="notes" class="form-control" placeholder="Payment notes (optional)">
                </div>
            </div>

            <div id="balance-info" class="alert alert-info d-none mb-3">
                <i class="bi bi-info-circle"></i> <span id="balance-msg"></span>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary"><i class="bi bi-cash-stack"></i> Record Payment</button>
                <a href="{{ url_for('payments.list_payments') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('supplier-select').addEventListener('change', function() {
    const opt = this.selectedOptions[0];
    const info = document.getElementById('balance-info');
    if (opt && opt.dataset.balance) {
        const bal = parseFloat(opt.dataset.balance);
        document.getElementById('balance-msg').textContent = `Outstanding balance for ${opt.text.split('(')[0].trim()}: Rs.${bal.toLocaleString('en-IN', {minimumFractionDigits: 2})}`;
        info.classList.remove('d-none');
    } else {
        info.classList.add('d-none');
    }
});
</script>
{% endblock %}
